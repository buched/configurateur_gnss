<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GNSS Config v4.6 - Manu alias Buched</title>
    <style>
        :root { --primary: #3498db; --success: #27ae60; --danger: #e74c3c; --dark: #2c3e50; --aog: #2ecc71; }
        body { font-family: 'Segoe UI', sans-serif; background: #F0F2F5; margin: 0; padding: 10px; display: flex; justify-content: center; }
        .container { background: white; width: 100%; max-width: 950px; padding: 15px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); box-sizing: border-box; }
        h1 { text-align: center; color: var(--dark); margin-bottom: 5px; border-bottom: 2px solid var(--primary); padding-bottom: 10px; font-size: 1.5rem; }
        .author-tag { text-align: center; font-size: 11px; color: #7f8c8d; margin-bottom: 15px; }
        .section { margin-bottom: 15px; padding: 12px; border: 1px solid #ddd; border-radius: 8px; background: #fafafa; }
        .section-title { font-weight: bold; margin-bottom: 10px; color: var(--primary); text-transform: uppercase; border-left: 4px solid var(--primary); padding-left: 10px; font-size: 13px; }
        .grid { display: grid; grid-template-columns: 1fr; gap: 10px; margin-bottom: 10px; }
        @media (min-width: 600px) { .grid { grid-template-columns: 1fr 1fr 1fr; } .span-mobile-2 { grid-column: span 2; } }
        label { display: block; margin-bottom: 5px; font-weight: 600; font-size: 12px; }
        select, button, input { width: 100%; padding: 12px; border-radius: 5px; border: 1px solid #ccc; box-sizing: border-box; font-size: 14px; }
        .aog-default { background-color: #e8f8f1 !important; border: 2px solid var(--aog) !important; font-weight: bold; }
        .nmea-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; background: white; padding: 10px; border-radius: 5px; border: 1px solid #eee; }
        @media (min-width: 600px) { .nmea-grid { grid-template-columns: repeat(4, 1fr); } }
        .nmea-item { display: flex; align-items: center; font-size: 12px; }
        .nmea-item input { width: 20px; height: 20px; margin-right: 8px; }
        #btnConnect { background: var(--primary); color: white; border: none; cursor: pointer; font-weight: bold; height: 50px; }
        #btnConnect.connected { background: var(--danger) !important; }
        #btnScan { background: var(--dark); color: white; border: none; cursor: pointer; font-size: 11px; margin-top: 5px; height: 35px; font-weight: bold; }
        #btnSend { background: var(--success); color: white; border: none; cursor: pointer; font-weight: bold; font-size: 16px; min-height: 65px; margin-top: 15px; width: 100%; }
        #btnSend:disabled { background: #ccc !important; cursor: not-allowed; opacity: 0.6; }
        #btnClear { background: #7f8c8d; color: white; margin-top: 10px; height: 40px; border: none; cursor: pointer; font-size: 12px; font-weight: bold; border-radius: 5px; }
        #console { background: #000; color: #00ff00; font-family: 'Consolas', monospace; height: 300px; margin-top: 10px; font-size: 10px; overflow-y: auto; padding: 10px; border-radius: 5px; white-space: pre-wrap; border: 1px solid #333; }
    </style>
</head>
<body>

<div class="container">
    <h1>CONFIGURATEUR GNSS</h1>
    <div class="author-tag">Outil communautaire développé par Buched - Manu - Licence CC BY 4.0</div>

    <div class="section">
        <div class="section-title">1. Connexion Série</div>
        <div class="grid">
            <div class="span-mobile-2">
                <button id="btnConnect">CONNECTER LE RÉCEPTEUR</button>
                <button id="btnScan">🔍 SCANNER & DÉTECTER MODÈLE</button>
            </div>
            <div>
                <label>Vitesse :</label>
                <select id="baudRate">
                    <option value="9600">9600</option>
                    <option value="38400">38400</option>
                    <option value="115200" selected>115200</option>
                    <option value="460800">460800</option>
                    <option value="921600">921600</option>
                </select>
            </div>
        </div>
    </div>

    <div class="section">
        <div class="section-title">2. Matériel & Mode</div>
        <div class="grid">
            <div><label>Modèle :</label><select id="gnssModel"><option value="UM980">Unicore UM980</option><option value="UM982">Unicore UM982</option><option value="M20D">Bynav M20D</option></select></div>
            <div><label>Mode :</label><select id="opMode"><option value="SINGLE">Single Antenna</option><option value="DUAL">Dual Antenna</option></select></div>
            <div><label>Fréquence :</label><select id="hzRate" class="aog-default"><option value="1">1 Hz</option><option value="5">5 Hz</option><option value="10" selected>10 Hz (AOG)</option></select></div>
        </div>
    </div>

    <div id="dualSection" class="section" style="display:none;">
        <div class="section-title">3. Offsets Antenne Dual (m)</div>
        <div class="grid">
            <div><label>X :</label><input type="number" id="offsetX" value="0.000" step="0.01"></div>
            <div><label>Y :</label><input type="number" id="offsetY" value="0.000" step="0.01"></div>
            <div><label>Z :</label><input type="number" id="offsetZ" value="0.000" step="0.01"></div>
        </div>
    </div>

    <div id="nmeaSection" class="section">
        <div class="section-title">4. Sortie NMEA (COM2)</div>
        <div class="nmea-grid">
            <div class="nmea-item aog-default"><input type="checkbox" class="nmea" value="GPGGA" checked> GGA</div>
            <div class="nmea-item"><input type="checkbox" class="nmea" value="GPRMC"> RMC</div>
            <div class="nmea-item aog-default"><input type="checkbox" class="nmea" value="GPVTG" checked> VTG</div>
            <div class="nmea-item"><input type="checkbox" class="nmea" value="GPGSA"> GSA</div>
            <div class="nmea-item"><input type="checkbox" class="nmea" value="GPGSV"> GSV</div>
            <div class="nmea-item"><input type="checkbox" class="nmea" value="GPHEADING"> HEADING</div>
            <div class="nmea-item"><input type="checkbox" class="nmea" value="GPROOT"> ROOT</div>
            <div class="nmea-item"><input type="checkbox" class="nmea" value="GPGST"> GST</div>
        </div>
    </div>

    <button id="btnSend" disabled>ENVOYER LA CONFIGURATION</button>
    <button id="btnClear">VIDER LA CONSOLE</button>
    <div id="console"></div>
</div>

<script>
    let port = null;
    let reader = null;
    let isReading = false;
    let isConfiguring = false;

    const btnConnect = document.getElementById('btnConnect');
    const btnScan = document.getElementById('btnScan');
    const btnSend = document.getElementById('btnSend');
    const consoleDiv = document.getElementById('console');
    const baudSelect = document.getElementById('baudRate');
    const modelSelect = document.getElementById('gnssModel');

    function log(msg) { 
        consoleDiv.innerText += `[${new Date().toLocaleTimeString()}] ${msg}\n`; 
        consoleDiv.scrollTop = consoleDiv.scrollHeight; 
    }

    function updateUI() {
        document.getElementById('dualSection').style.display = (document.getElementById('opMode').value === "DUAL") ? 'block' : 'none';
    }

    function updateButtonState(isConnected) {
        if (isConnected) {
            btnConnect.textContent = "DÉCONNECTER";
            btnConnect.classList.add('connected');
            btnSend.disabled = false;
        } else {
            btnConnect.textContent = "CONNECTER LE RÉCEPTEUR";
            btnConnect.classList.remove('connected');
            btnSend.disabled = true;
        }
    }

    async function smartOpen(baud) {
        if (!port) return false;
        if (port.opened) { updateButtonState(true); return true; }
        try {
            await port.open({ baudRate: parseInt(baud) });
            log(`✅ Port ouvert : ${baud} bauds.`);
            updateButtonState(true);
            startReading();
            return true;
        } catch (e) {
            if (e.message.includes("already open")) { updateButtonState(true); return true; }
            log(`❌ Erreur : ${e.message}`);
            return false;
        }
    }

    async function safeClose() {
        isReading = false;
        if (reader) { try { await reader.cancel(); await reader.releaseLock(); } catch(e) {} reader = null; }
        if (port && port.opened) { try { await port.close(); } catch(e) {} }
        log("🔌 Déconnecté.");
        updateButtonState(false);
    }

    async function startReading() {
        if (isReading) return;
        isReading = true;
        const decoder = new TextDecoder();
        while (port && port.opened && isReading) {
            try {
                reader = port.readable.getReader();
                while (true) {
                    const { value, done } = await reader.read();
                    if (done) break;
                    const txt = decoder.decode(value).trim();
                    if (txt.length > 5 && !isConfiguring) log("RX: " + txt);
                }
            } catch (err) { break; } 
            finally { if(reader) { try { reader.releaseLock(); } catch(e){} reader = null; } }
        }
    }

btnScan.onclick = async () => {
        try {
            port = await navigator.serial.requestPort();
            const encoder = new TextEncoder();
            const decoder = new TextDecoder();
            const bauds = [115200, 460800, 921600, 38400, 9600];

            log("🔍 Recherche du récepteur...");

            for (let speed of bauds) {
                log(`Test : ${speed} bauds...`);
                try {
                    if (port.opened) await port.close();
                    await port.open({ baudRate: speed });
                    
                    const writer = port.writable.getWriter();
                    await writer.write(encoder.encode("LOG COM1 BYCONFIGA ONTIME 1\r\nVERSIONA\r\n"));
                    writer.releaseLock();

                    const reader = port.readable.getReader();
                    const timeout = setTimeout(() => reader.cancel(), 1200);
                    
                    let fullResponse = "";
                    try {
                        while(true) {
                            const { value, done } = await reader.read();
                            if (done) break;
                            fullResponse += decoder.decode(value).toUpperCase();
                            // Si on trouve le signe distinctif de Bynav, on arrête de lire
                            if (fullResponse.includes("<")) break; 
                        }
                    } catch(e) {} // Timeout ou cancel
                    
                    clearTimeout(timeout);
                    reader.releaseLock();

                    if (fullResponse.length > 0) {
                        let modelFound = "Générique";
                        let gnssVal = "UM980";

                        // Détection précise
                        if (fullResponse.includes("<") || fullResponse.includes("BYNAV")) { 
                            modelFound = "Bynav M20D"; 
                            gnssVal = "M20D"; 
                        }
                        else if (fullResponse.includes("UM982")) { 
                            modelFound = "Unicore UM982"; 
                            gnssVal = "UM982"; 
                        }
                        else if (fullResponse.includes("UM980") || fullResponse.includes("UM960")) { 
                            modelFound = "Unicore UM980"; 
                            gnssVal = "UM980"; 
                        }

                        log(`✅ ${modelFound} identifié à ${speed} bauds !`);
                        
                        document.getElementById('gnssModel').value = gnssVal;
                        baudSelect.value = speed;
                        
                        updateButtonState(true);
                        startReading();
                        updateUI();
                        return; 
                    }
                    await port.close();
                } catch (e) {
                    if (port.opened) await port.close();
                }
            }
            log("❌ Aucun signal. Vérifie le branchement.");
        } catch (e) {
            log("Erreur : " + e.message);
        }
    };

    btnConnect.onclick = async () => {
        if (btnConnect.classList.contains('connected')) { await safeClose(); return; }
        if (!port) port = await navigator.serial.requestPort();
        await smartOpen(baudSelect.value);
    };

    btnSend.onclick = async () => {
        if (isConfiguring) return;
        isConfiguring = true;
        btnSend.disabled = true;
        const encoder = new TextEncoder();
        const model = modelSelect.value;
        const interval = (1 / document.getElementById('hzRate').value).toFixed(1);

        try {
            await smartOpen(baudSelect.value);
            log("🚀 Envoi FRESET...");
            let wr = port.writable.getWriter();
            await wr.write(encoder.encode("FRESET\r\n"));
            wr.releaseLock();

            log("⏳ Reboot (12s)...");
            await safeClose();
            await new Promise(r => setTimeout(r, 12000));

            log("Reconnexion usine (115200)...");
            await smartOpen(115200);

            let cmds = ["UNLOGALL"];
            if (model.startsWith("UM")) {
                cmds.push("CONFIG ANTENNA POWERON", "CONFIG NMEAVERSION V411", "CONFIG RTK TIMEOUT 180", "UNMASK GPS", "MASK BDS", "UNMASK GLO", "UNMASK GAL", "CONFIG COM2 460800");
                if (document.getElementById('opMode').value === "DUAL") {
                    cmds.push(`CONFIG ANTENNADELTAHEN OFFSET ${document.getElementById('offsetX').value} ${document.getElementById('offsetY').value} ${document.getElementById('offsetZ').value}`, "MODE ROVER SURVEY", "CONFIG HEADING TRACTOR");
                } else { cmds.push("MODE ROVER UAV"); }
            } else {
                cmds.push("RTKTYPE ROVER", "SET OBSFREQ 10", "SERIALCONFIG COM2 460800");
            }
            document.querySelectorAll('.nmea:checked').forEach(cb => {
                cmds.push(model.startsWith("UM") ? `${cb.value} COM2 ${interval}` : `LOG COM2 ${cb.value} ONTIME ${interval}`);
            });
            cmds.push("SAVECONFIG");

            let mainWr = port.writable.getWriter();
            for (let c of cmds) {
                log(">>> " + c);
                await mainWr.write(encoder.encode(c + "\r\n"));
                await new Promise(r => setTimeout(r, 2400));
            }
            mainWr.releaseLock();
            log("✅ CONFIGURATION TERMINÉE !");
        } catch (e) { log("❌ ERREUR : " + e.message); }
        finally { isConfiguring = false; btnSend.disabled = false; }
    };

    document.getElementById('btnClear').onclick = () => { consoleDiv.innerText = ""; };
    document.getElementById('gnssModel').onchange = updateUI;
    document.getElementById('opMode').onchange = updateUI;
    updateUI();
</script>
</body>
</html>
